            </div>
        </nav>
    </header>
    <main>
        <section class="headline">
            <h1>Add Course</h1>
        </section>
        <section class="form">
            <form method="get" action="myCourses.html">
                <div>
                    <label for="course-name">Course name</label>
                    <input name="coure-name" type="text" required autofocus placeholder="e.g., Mathematics 2">
                </div>
                <div>
                    <label for="course-ins">Instructor</label>
                    <input name="course-ins" type="text" required placeholder="e.g., Dr.Mohamed">
                </div>
                <div>
                    <label for="credit-hours">Credit hours</label>
                    <input type="number" max="4" min="2" required placeholder="e.g., 2,3,4">
                </div>
                <div>
                    <label for="note">Notes</label>
                    <textarea name="notes" placeholder="write your notes here."></textarea>
                </div>
                <div class="submit">
                    <input type="submit" name="submit">
                </div>
            </form>
        </section>
    </main>
